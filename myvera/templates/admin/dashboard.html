<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Paneli</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container">
    <h2>Hizmetler</h2>
    <a href="{{ url_for('new_service') }}">Yeni Hizmet Ekle</a>
    <ul>
      {% for service in services %}
        <li>{{ service.title }} - <a href="{{ url_for('edit_service', service_id=service.id) }}">Düzenle</a> - <a href="{{ url_for('delete_service', service_id=service.id) }}">Sil</a></li>
      {% endfor %}
    </ul>
    <a href="{{ url_for('logout') }}">Çıkış Yap</a>
  </div>
</body>
</html>
